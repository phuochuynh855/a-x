
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giám Sát MPPT855</title>
    <!-- Import Firebase SDK -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border-left: 5px solid #1a73e8; }
        .card label { font-size: 0.8rem; color: #666; display: block; margin-bottom: 5px; }
        .card span { font-size: 1.2rem; font-weight: bold; color: #333; }
        .status { text-align: center; font-size: 0.8rem; margin-top: 15px; color: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h2>MPPT MONITOR</h2>
    
    <div class="input-group">
        <input type="text" id="sdtInput" placeholder="Nhập số điện thoại thiết bị...">
        <button onclick="connectRealtime()">Theo Dõi</button>
    </div>

    <div id="displayArea" style="display: none;">
        <div class="grid">
            <div class="card">
                <label>Điện áp vào (Vi)</label>
                <span id="vIn">0.0</span> V
            </div>
            <div class="card">
                <label>Điện áp ra (Vo)</label>
                <span id="vOut">0.0</span> V
            </div>
            <div class="card">
                <label>Dòng điện (Io)</label>
                <span id="iOut">0.0</span> A
            </div>
            <div class="card">
                <label>Công suất (Po)</label>
                <span id="pNow">0.0</span> W
            </div>
            <div class="card">
                <label>Tổng năng lượng</label>
                <span id="eTot">0.0</span> Wh
            </div>
            <div class="card">
                <label>Nhiệt độ</label>
                <span id="tVal">0.0</span> °C
            </div>
        </div>
        <div class="status" id="lastUpdate">Đang chờ dữ liệu...</div>
        <div id="error" style="color: red; text-align: center; margin-top: 10px; font-weight: bold;"></div>
    </div>
</div>
<script>
    // 1. Cấu hình đầy đủ (Dùng API Key và URL từ code ESP của ông)
    const firebaseConfig = {
        apiKey: "AIzaSyDEA0sMeMinC9RR2vHnaPojcCVaPkYgEyI",
        databaseURL: "https://firebasedatabase.app",
        projectId: "mppt855-default-rtdb"
    };

    // 2. Khởi tạo
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function connectRealtime() {
        const sdt = document.getElementById('sdtInput').value.trim();
        if (!sdt) { alert("Vui lòng nhập SDT!"); return; }

        console.log("Đang kết nối tới thiết bị:", sdt);
        document.getElementById('displayArea').style.display = 'block';
        document.getElementById('lastUpdate').innerText = "Đang tìm dữ liệu trên server...";

        // 3. Đường dẫn phải khớp chính xác với code ESP: /devices/{sdt}
        const deviceRef = database.ref('devices/' + sdt);

        deviceRef.on('value', (snapshot) => {
            const data = snapshot.val();
            console.log("Dữ liệu nhận được:", data); // Kiểm tra xem có data không

            if (data) {
                // Gán giá trị và làm tròn 1 chữ số thập phân cho đẹp
                document.getElementById('vIn').innerText = data.vIn || "0.0";
                document.getElementById('vOut').innerText = data.vOut || "0.0";
                document.getElementById('iOut').innerText = data.iOut || "0.0";
                document.getElementById('pNow').innerText = data.pNow || "0.0";
                document.getElementById('eTot').innerText = data.eTot || "0.0";
                document.getElementById('tVal').innerText = data.tVal || "0.0";
                
                if (data.err > 0) {
                    document.getElementById('error').innerText = "Cảnh báo Lỗi: " + data.err;
                } else {
                    document.getElementById('error').innerText = "";
                }

                document.getElementById('lastUpdate').innerText = "Cập nhật lúc: " + new Date().toLocaleTimeString();
                document.getElementById('lastUpdate').style.color = "#28a745";
            } else {
                document.getElementById('lastUpdate').innerText = "Thiết bị này chưa có dữ liệu!";
                document.getElementById('lastUpdate').style.color = "orange";
            }
        }, (error) => {
            console.error("Lỗi Firebase:", error);
            document.getElementById('lastUpdate').innerText = "Lỗi truy cập: Kiểm tra lại Rules!";
            document.getElementById('lastUpdate').style.color = "red";
        });
    }
</script>
