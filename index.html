<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống MPPT855</title>
    <!-- Nhúng thư viện Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        body { background-color: #0f121a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background-color: #1c212d; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .box { background: #252b39; padding: 15px; border-radius: 10px; border-bottom: 3px solid #2ecc71; }
        .label { color: #888; font-size: 12px; text-transform: uppercase; }
        .value { color: #2ecc71; font-size: 24px; font-weight: bold; margin-top: 5px; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; text-align: center; }
        button { padding: 10px 20px; background: #2ecc71; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        #status { color: #f1c40f; margin: 15px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG MPPT855</h2>
    
    <!-- Phần nhập SĐT để tìm máy -->
    <input type="text" id="phoneInput" placeholder="Nhập số điện thoại khách">
    <br>
    <button onclick="connectFirebase()">KẾT NỐI MÁY</button>

    <div id="status">Vui lòng nhập SĐT để kiểm tra...</div>

    <div class="grid">
        <div class="box">
            <div class="label">V-VÀO</div>
            <div class="value" id="vIn">0.0V</div>
        </div>
        <div class="box">
            <div class="label">V-RA</div>
            <div class="value" id="vOut">0.0V</div>
        </div>
        <div class="box">
            <div class="label">DÒNG SẠC</div>
            <div class="value" id="iOut">0.0A</div>
        </div>
        <div class="box">
            <div class="label">CÔNG SUẤT</div>
            <div class="value" id="pOut">0W</div>
        </div>
    </div>
</div>

<script>
    // 1. Cấu hình Firebase của bạn
    const firebaseConfig = {
        databaseURL: "https://firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function connectFirebase() {
        const sdt = document.getElementById("phoneInput").value;
        const status = document.getElementById("status");

        if (!sdt) {
            alert("Bạn chưa nhập số điện thoại!");
            return;
        }

        status.innerText = "Đang tìm kiếm thiết bị...";

        // 2. Tìm ChipID từ danh bạ dựa trên SĐT
        database.ref('danh_ba/' + sdt).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const chipID = snapshot.val();
                status.innerText = "● Đang trực tuyến (ID: " + chipID + ")";
                status.style.color = "#2ecc71";

                // 3. Lắng nghe dữ liệu thực tế của ChipID đó
                database.ref('devices/' + chipID).on('value', (data) => {
                    const val = data.val();
                    if (val) {
                        document.getElementById("vIn").innerText = (val.vIn || 0) + "V";
                        document.getElementById("vOut").innerText = (val.vOut || 0) + "V";
                        document.getElementById("iOut").innerText = (val.iOut || 0) + "A";
                        // Tự tính công suất
                        let p = (val.vOut * val.iOut).toFixed(1);
                        document.getElementById("pOut").innerText = p + "W";
                    }
                });
            } else {
                status.innerText = "SĐT này chưa được đăng ký!";
                status.style.color = "#e74c3c";
            }
        });
    }
</script>

</body>
</html>
