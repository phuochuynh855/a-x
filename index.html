<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>MPPT855 Dashboard</title>
<style>
body { font-family: Arial; text-align:center; margin-top:50px; }
.value { font-size: 2em; margin: 20px 0; }
.status { font-size: 1.2em; margin-top: 10px; color: green; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<h1>MPPT855 Dashboard</h1>
<div class="value">vIn: <span id="vin">--</span> V</div>
<div class="value">vOut: <span id="vout">--</span> V</div>
<div class="value">iOut: <span id="iout">--</span> A</div>
<div class="status" id="status">Đang kết nối...</div>

<script>
  // --- Firebase config ---
  const firebaseConfig = {
    apiKey: "AIzaSyDEA0sMeMinC9RR2vHnaPojcCVaPkYgEyI",
    databaseURL: "https://mppt855-default-rtdb.asia-southeast1.firebasedatabase.app"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Nhập SDT khách
  const sdt = "0987226855";

  function updateData() {
    db.ref('/devices/' + sdt).once('value')
      .then(snapshot => {
        const data = snapshot.val();
        if(data){
          document.getElementById('vin').innerText = data.vIn.toFixed(2);
          document.getElementById('vout').innerText = data.vOut.toFixed(2);
          document.getElementById('iout').innerText = data.iOut.toFixed(2);
          document.getElementById('status').innerText = "Đã kết nối";
          document.getElementById('status').style.color = "green";
        } else {
          document.getElementById('status').innerText = "Chưa có dữ liệu";
          document.getElementById('status').style.color = "orange";
        }
      })
      .catch(err => {
        console.log(err);
        document.getElementById('status').innerText = "Lỗi kết nối";
        document.getElementById('status').style.color = "red";
      });
  }

  setInterval(updateData, 2000); // Cập nhật mỗi 2 giây
</script>

</body>
</html>
