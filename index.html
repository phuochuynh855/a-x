<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIÁM SÁT MPPT855</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #0f121a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .card { background: #1c212d; max-width: 400px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #2ecc71; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #252b39; color: white; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2ecc71; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #27ae60; }
        .status { margin: 15px 0; font-size: 14px; color: #f1c40f; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .box { background: #252b39; padding: 15px; border-radius: 12px; border-bottom: 4px solid #2ecc71; }
        .label { font-size: 11px; color: #888; margin-bottom: 5px; }
        .value { font-size: 22px; font-weight: bold; color: #2ecc71; }
    </style>
</head>
<body>

<div class="card">
    <h2>HỆ THỐNG MPPT855</h2>
    <input type="text" id="phoneInput" placeholder="Nhập Số Điện Thoại Của Bạn">
    <button onclick="startMonitor()">XEM DỮ LIỆU</button>
    <div id="status">Chưa kết nối</div>

    <div class="grid">
        <div class="box"><div class="label">V-VÀO</div><div class="value" id="vIn">0.0V</div></div>
        <div class="box"><div class="label">V-RA</div><div class="value" id="vOut">0.0V</div></div>
        <div class="box"><div class="label">DÒNG SẠC</div><div class="value" id="iOut">0.0A</div></div>
        <div class="box"><div class="label">CÔNG SUẤT</div><div class="value" id="pOut">0W</div></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function startMonitor() {
        const sdt = document.getElementById("phoneInput").value.trim();
        if(!sdt) return alert("Vui lòng nhập SĐT!");

        document.getElementById("status").innerText = "Đang kết nối tới máy...";

        db.ref('devices/' + sdt).on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById("status").innerText = "● Đang trực tuyến";
                document.getElementById("status").style.color = "#2ecc71";
                document.getElementById("vIn").innerText = (data.vIn || 0) + "V";
                document.getElementById("vOut").innerText = (data.vOut || 0) + "V";
                document.getElementById("iOut").innerText = (data.iOut || 0) + "A";
                document.getElementById("pOut").innerText = ((data.vOut || 0) * (data.iOut || 0)).toFixed(1) + "W";
            } else {
                document.getElementById("status").innerText = "Không tìm thấy dữ liệu cho số này!";
                document.getElementById("status").style.color = "#e74c3c";
            }
        });
    }
</script>

</body>
</html>
